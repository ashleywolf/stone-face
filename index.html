<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Face</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #e6edf3; }
canvas { display: block; width: 100%; height: 100%; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10; pointer-events: none;
}
#overlay.interactive { pointer-events: auto; }
#overlay-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(13,17,23,0.92);
}
#overlay-content {
  position: relative; z-index: 11; text-align: center; max-width: 700px; padding: 40px;
}
#overlay h1 { font-size: 64px; margin-bottom: 12px; letter-spacing: 4px; }
#overlay h2 { font-size: 24px; font-weight: 400; color: #8b949e; margin-bottom: 8px; }
#overlay p { font-size: 18px; color: #8b949e; margin-bottom: 24px; }
#overlay button {
  background: #238636; color: #fff; border: none; padding: 14px 40px;
  font-size: 20px; border-radius: 8px; cursor: pointer; margin-top: 16px;
  transition: background 0.2s;
}
#overlay button:hover { background: #2ea043; }
.countdown-text { font-size: 120px; font-weight: 700; color: #f0c674; }
.calibration-text { font-size: 28px; color: #58a6ff; }
.calibration-sub { font-size: 18px; color: #8b949e; margin-top: 8px; }

#game-over-gallery {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-top: 16px; max-height: 240px; overflow-y: auto;
}
#game-over-gallery img {
  width: 140px; height: 105px; object-fit: cover; border-radius: 6px;
  border: 2px solid #30363d;
}
#composure-graph { border-radius: 8px; margin-top: 12px; }

/* Leaderboard styles */
.lb-container {
  border: 1px solid #f0c674; border-radius: 10px; padding: 16px;
  background: rgba(240,198,100,0.04); margin-top: 16px; max-width: 520px;
  margin-left: auto; margin-right: auto;
}
.lb-title { font-size: 18px; font-weight: 700; color: #f0c674; margin-bottom: 10px; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.lb-table th { color: #8b949e; font-weight: 600; text-align: left; padding: 4px 6px; border-bottom: 1px solid #21262d; font-size: 11px; text-transform: uppercase; }
.lb-table td { padding: 5px 6px; border-bottom: 1px solid #161b22; vertical-align: middle; }
.lb-table tr.lb-current { background: rgba(240,198,100,0.1); }
.lb-table tr.lb-current td { color: #f0c674; font-weight: 600; }
.lb-avatar { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; background: #30363d; }
.lb-avatar-placeholder { display: inline-block; width: 24px; height: 24px; border-radius: 50%; background: #30363d; }
.lb-rank { font-weight: 700; color: #8b949e; min-width: 24px; }
.lb-save-btn {
  background: #238636; color: #fff; border: none; padding: 8px 20px;
  font-size: 14px; border-radius: 6px; cursor: pointer; margin-top: 10px;
  transition: background 0.2s;
}
.lb-save-btn:hover { background: #2ea043; }
.lb-save-btn:disabled { background: #21262d; color: #8b949e; cursor: default; }
.lb-save-hint { font-size: 12px; color: #8b949e; margin-top: 6px; }

/* Username input */
.gh-user-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
.gh-user-input {
  background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px;
  border-radius: 6px; font-size: 14px; width: 200px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.gh-user-input:focus { border-color: #58a6ff; }
.gh-user-input::placeholder { color: #484f58; }
.gh-avatar-preview { width: 36px; height: 36px; border-radius: 50%; background: #30363d; display: none; }

/* Compact title leaderboard */
.lb-mini { margin-top: 12px; }
.lb-mini .lb-container { padding: 10px 14px; }
.lb-mini .lb-title { font-size: 14px; margin-bottom: 6px; }
.lb-mini .lb-table { font-size: 12px; }
.lb-mini .lb-table td { padding: 3px 5px; }
.lb-mini .lb-avatar { width: 20px; height: 20px; }
.lb-mini .lb-avatar-placeholder { width: 20px; height: 20px; }

.hidden { display: none !important; }
</style>
</head>

// --- Init MediaPipe ---
async function initFaceLandmarker() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    outputFaceBlendshapes: true,
    runningMode: "VIDEO",
    numFaces: 1
  });
}

async function initWebcam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadeddata = r; });
  webcamReady = true;
}

function resizeCanvas() {
  canvasW = window.innerWidth;
  canvasH = window.innerHeight;
  canvas.width = canvasW;
  canvas.height = canvasH;
  confettiCanvas.width = canvasW;
  confettiCanvas.height = canvasH;
}

// --- Audio ---
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function playSound(sound) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const segDur = sound.duration / 1000 / sound.freqs.length;
  sound.freqs.forEach((pair, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = sound.type || "sine";
    osc.frequency.setValueAtTime(pair[0], now + i * segDur);
    osc.frequency.linearRampToValueAtTime(pair[1], now + (i + 1) * segDur);
    gain.gain.setValueAtTime(0.15, now + i * segDur);
    gain.gain.linearRampToValueAtTime(0, now + (i + 1) * segDur + 0.05);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * segDur);
    osc.stop(now + (i + 1) * segDur + 0.1);
  });
}

function startDrone() {
  ensureAudio();
  droneOsc = audioCtx.createOscillator();
  droneGain = audioCtx.createGain();
  droneOsc.type = "sine";
  droneOsc.frequency.value = 55;
  droneGain.gain.value = 0;
  droneOsc.connect(droneGain).connect(audioCtx.destination);
  droneOsc.start();
}

function updateDrone(elapsed) {
  if (!droneGain) return;
  const progress = Math.min(elapsed / GAME_DURATION, 1);
  droneGain.gain.setTargetAtTime(0.04 + progress * 0.08, audioCtx.currentTime, 0.5);
  droneOsc.frequency.setTargetAtTime(55 + progress * 40, audioCtx.currentTime, 0.5);
}

function stopDrone() {
  if (droneOsc) { try { droneOsc.stop(); } catch(e) {} droneOsc = null; }
  droneGain = null;
}

function playBustedSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [880, 660, 440].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.2, now + i * 0.08);
    gain.gain.linearRampToValueAtTime(0, now + i * 0.08 + 0.12);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.08);
    osc.stop(now + i * 0.08 + 0.15);
  });
}

function playWinSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [262, 330, 392, 523].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.2, now + i * 0.15);
    gain.gain.linearRampToValueAtTime(0.05, now + i * 0.15 + 0.4);
    gain.gain.linearRampToValueAtTime(0, now + 1.0);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.15);
    osc.stop(now + 1.2);
  });
}

function playLoseSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [392, 370, 349, 200].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.18, now + i * 0.25);
    gain.gain.linearRampToValueAtTime(0, now + i * 0.25 + (i === 3 ? 0.8 : 0.3));
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.25);
    osc.stop(now + i * 0.25 + 1.0);
  });
}

// --- Utility ---
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getHighScore() {
  try {
    const raw = localStorage.getItem('stoneFace_highScore');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveHighScore(time, comp) {
  const prev = getHighScore();
  if (!prev || time > prev.time || (time === prev.time && comp > prev.composure)) {
    localStorage.setItem('stoneFace_highScore', JSON.stringify({ time, composure: comp }));
    return true;
  }
  return false;
}

// --- Leaderboard ---
function getStoredUsername() {
  return localStorage.getItem('github_username') || '';
}

function setStoredUsername(name) {
  localStorage.setItem('github_username', name.trim());
}

function getLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem('stoneFace_leaderboard') || '[]');
  } catch { return []; }
}

function saveLeaderboard(entries) {
  localStorage.setItem('stoneFace_leaderboard', JSON.stringify(entries));
}

function sortLeaderboard(entries) {
  return entries.sort((a, b) => {
    if (b.timeSurvived !== a.timeSurvived) return b.timeSurvived - a.timeSurvived;
    if (a.won && b.won) return b.composure - a.composure;
    if (a.won) return -1;
    if (b.won) return 1;
    return b.composure - a.composure;
  });
}

function qualifiesForLeaderboard(time, comp) {
  const lb = getLeaderboard();
  if (lb.length < 10) return true;
  const sorted = sortLeaderboard([...lb]);
  const worst = sorted[sorted.length - 1];
  if (time > worst.timeSurvived) return true;
  if (time === worst.timeSurvived && comp > worst.composure) return true;
  return false;
}

function addToLeaderboard(entry) {
  const lb = getLeaderboard();
  lb.push(entry);
  const sorted = sortLeaderboard(lb);
  saveLeaderboard(sorted.slice(0, 10));
}

function avatarUrl(username, size) {
  return username ? `https://github.com/${encodeURIComponent(username)}.png?size=${size}` : '';
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function renderLeaderboardTable(entries, currentId, maxRows) {
  const rows = entries.slice(0, maxRows || 10);
  if (rows.length === 0) return '<p style="color:#484f58;font-size:13px;">No scores yet. Be the first!</p>';

  let html = '<table class="lb-table"><thead><tr><th>#</th><th></th><th>Player</th><th>Time</th><th>Composure</th><th>Date</th></tr></thead><tbody>';
  rows.forEach((e, i) => {
    const isCurrent = currentId && e.id === currentId;
    const cls = isCurrent ? ' class="lb-current"' : '';
    const avatarHtml = e.username
      ? `<img class="lb-avatar" src="${avatarUrl(e.username, 48)}" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'" alt=""><span class="lb-avatar-placeholder" style="display:none"></span>`
      : '<span class="lb-avatar-placeholder"></span>';
    const name = e.username || 'Anonymous';
    const timeStr = e.won ? e.timeSurvived + 's 👑' : e.timeSurvived + 's';
    html += `<tr${cls}><td class="lb-rank">${i + 1}</td><td>${avatarHtml}</td><td>${name}</td><td>${timeStr}</td><td>${e.composure}%</td><td>${formatDate(e.date)}</td></tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function renderTitleLeaderboard() {
  const el = document.getElementById('titleLeaderboard');
  if (!el) return;
  const lb = getLeaderboard();
  if (lb.length === 0) { el.innerHTML = ''; return; }
  const sorted = sortLeaderboard([...lb]);
  el.innerHTML = `<div class="lb-container"><div class="lb-title">\u{1F3C6} LEADERBOARD</div>${renderLeaderboardTable(sorted, null, 5)}</div>`;
}

function playCountdownBeep(freq) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();

  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.15);
}

function playVictoryFanfare() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [262, 330, 392, 523, 659, 784].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.2, now + i * 0.12);
    gain.gain.linearRampToValueAtTime(0.08, now + i * 0.12 + 0.3);

    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.12);
    osc.stop(now + 1.8);
  });
  [523, 659, 784].forEach(f => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0, now + 0.8);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.9);
    gain.gain.linearRampToValueAtTime(0, now + 2.5);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + 0.8);
    osc.stop(now + 2.8);
  });
}

function spawnConfetti() {
  const colors = ['#f85149', '#39d353', '#58a6ff', '#f0c674', '#bc8cff', '#ff7b72', '#3fb950', '#79c0ff'];
  for (let i = 0; i < 40; i++) {
    confettiParticles.push({
      x: canvasW / 2 + (Math.random() - 0.5) * 300,
      y: canvasH * 0.3,
      vx: (Math.random() - 0.5) * 8,
      vy: -(Math.random() * 6 + 2),
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 4 + Math.random() * 6,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      life: 0
    });
  }
}

function updateConfetti() {
  confettiParticles = confettiParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.rotation += p.rotSpeed;
    p.life++;
    return p.life < 300 && p.y < canvasH + 20;
  });
}

function drawConfetti() {
  confettiCtx.clearRect(0, 0, canvasW, canvasH);
  confettiParticles.forEach(p => {
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rotation);
    confettiCtx.fillStyle = p.color;
    confettiCtx.globalAlpha = Math.max(0, 1 - p.life / 300);
    confettiCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    confettiCtx.restore();
  });
}

// --- Blendshapes ---
function getBlendshapes() {
  if (!faceLandmarker || !webcamReady) return null;
  const now = performance.now();
  try {
    const results = faceLandmarker.detectForVideo(video, now);
    if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
      const map = {};
      for (const bs of results.faceBlendshapes[0].categories) {
        if (BLENDSHAPE_KEYS.includes(bs.categoryName)) {
          map[bs.categoryName] = bs.score;
        }
      }
      return map;
    }
  } catch(e) {}
  return null;
}

function calcDeviation(current) {
  if (!current) return 0;
  let maxDev = 0;
  // Smile
  const smileL = Math.max(0, (current.mouthSmileLeft || 0) - (baseline.mouthSmileLeft || 0));
  const smileR = Math.max(0, (current.mouthSmileRight || 0) - (baseline.mouthSmileRight || 0));
  maxDev = Math.max(maxDev, (smileL + smileR) / 2);
  // Jaw
  const jaw = Math.max(0, (current.jawOpen || 0) - (baseline.jawOpen || 0));
  maxDev = Math.max(maxDev, jaw);
  // Brow
  const browL = Math.max(0, (current.browOuterUpLeft || 0) - (baseline.browOuterUpLeft || 0));
  const browR = Math.max(0, (current.browOuterUpRight || 0) - (baseline.browOuterUpRight || 0));
  maxDev = Math.max(maxDev, (browL + browR) / 2);
  // Squint
  const sqL = Math.max(0, (current.eyeSquintLeft || 0) - (baseline.eyeSquintLeft || 0));
  const sqR = Math.max(0, (current.eyeSquintRight || 0) - (baseline.eyeSquintRight || 0));
  maxDev = Math.max(maxDev, (sqL + sqR) / 2);
  // Cheek puff
  const cheek = Math.max(0, (current.cheekPuff || 0) - (baseline.cheekPuff || 0));
  maxDev = Math.max(maxDev, cheek);
  // Pucker
  const pucker = Math.max(0, (current.mouthPucker || 0) - (baseline.mouthPucker || 0));
  maxDev = Math.max(maxDev, pucker);

  return maxDev;
}

function detectExpressions(current) {
  if (!current) return;
  const smileVal = Math.max(0, ((current.mouthSmileLeft || 0) + (current.mouthSmileRight || 0)) / 2 - ((baseline.mouthSmileLeft || 0) + (baseline.mouthSmileRight || 0)) / 2);
  const jawVal = Math.max(0, (current.jawOpen || 0) - (baseline.jawOpen || 0));
  const browVal = Math.max(0, ((current.browOuterUpLeft || 0) + (current.browOuterUpRight || 0)) / 2 - ((baseline.browOuterUpLeft || 0) + (baseline.browOuterUpRight || 0)) / 2);

  expressionIndicators.smile = smileVal > 0.12 ? Math.min(1, smileVal * 3) : 0;
  expressionIndicators.surprise = (jawVal > 0.15 || browVal > 0.15) ? Math.min(1, Math.max(jawVal, browVal) * 3) : 0;
  expressionIndicators.laugh = (smileVal > 0.1 && jawVal > 0.1) ? Math.min(1, (smileVal + jawVal) * 2) : 0;
  expressionIndicators.eyebrow = browVal > 0.12 ? Math.min(1, browVal * 3) : 0;
}

// --- Drawing ---
function getWebcamRect() {
  const vw = video.videoWidth || 640;
  const vh = video.videoHeight || 480;
  const maxW = canvasW * 0.65;
  const maxH = canvasH * 0.7;
  let w = maxW;
  let h = w * (vh / vw);
  if (h > maxH) { h = maxH; w = h * (vw / vh); }
  const x = (canvasW - w) / 2;
  const y = (canvasH - h) / 2 + 20;
  return { x, y, w, h };
}

function drawWebcam(rect) {
  ctx.save();
  const r = 12;

  if (activeFilter && state === "playing") {
    ctx.save();
    switch (activeFilter) {
      case "stretch-h":
        ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
        ctx.scale(1.4, 0.85);
        ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));
        break;
      case "stretch-v":
        ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
        ctx.scale(0.85, 1.4);
        ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));
        break;
      case "mirror":
        ctx.translate(rect.x + rect.w, rect.y);
        ctx.scale(-1, 1);
        ctx.translate(-rect.x, -rect.y);
        // Fall through to draw mirrored, but we already mirror the base draw
        // so this double-mirrors (un-mirrors) -- let's do a vertical flip instead
        ctx.translate(rect.x + rect.w / 2, rect.y + rect.h);
        ctx.scale(1, -1);
        ctx.translate(-(rect.x + rect.w / 2), -rect.y);
        break;
      case "tiny-head":
        ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
        ctx.scale(0.5, 0.5);
        ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));
        break;
    }

    // Clip rounded rect
    ctx.beginPath();
    ctx.moveTo(rect.x + r, rect.y);
    ctx.arcTo(rect.x + rect.w, rect.y, rect.x + rect.w, rect.y + rect.h, r);
    ctx.arcTo(rect.x + rect.w, rect.y + rect.h, rect.x, rect.y + rect.h, r);
    ctx.arcTo(rect.x, rect.y + rect.h, rect.x, rect.y, r);
    ctx.arcTo(rect.x, rect.y, rect.x + rect.w, rect.y, r);
    ctx.closePath();
    ctx.clip();

    // Draw mirrored webcam
    ctx.translate(rect.x + rect.w, rect.y);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, rect.w, rect.h);
    ctx.restore();

    // Post-processing filters
    if (activeFilter === "invert" || activeFilter === "hue-rotate") {
      ctx.save();
      ctx.globalCompositeOperation = activeFilter === "invert" ? "difference" : "hue";
      ctx.fillStyle = activeFilter === "invert" ? "#ffffff" : `hsl(${((performance.now() - filterStartTime) * 0.2) % 360}, 100%, 50%)`;
      ctx.beginPath();
      ctx.moveTo(rect.x + r, rect.y);
      ctx.arcTo(rect.x + rect.w, rect.y, rect.x + rect.w, rect.y + rect.h, r);
      ctx.arcTo(rect.x + rect.w, rect.y + rect.h, rect.x, rect.y + rect.h, r);
      ctx.arcTo(rect.x, rect.y + rect.h, rect.x, rect.y, r);
      ctx.arcTo(rect.x, rect.y, rect.x + rect.w, rect.y, r);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    if (activeFilter === "fisheye") {
      // Barrel distortion via scaled concentric draws
      ctx.save();
      ctx.globalAlpha = 0.3;
      const cx = rect.x + rect.w / 2;
      const cy = rect.y + rect.h / 2;
      ctx.translate(cx, cy);
      ctx.scale(1.15, 1.15);
      ctx.translate(-cx, -cy);
      ctx.beginPath();
      ctx.moveTo(rect.x + r, rect.y);
      ctx.arcTo(rect.x + rect.w, rect.y, rect.x + rect.w, rect.y + rect.h, r);
      ctx.arcTo(rect.x + rect.w, rect.y + rect.h, rect.x, rect.y + rect.h, r);
      ctx.arcTo(rect.x, rect.y + rect.h, rect.x, rect.y, r);
      ctx.arcTo(rect.x, rect.y, rect.x + rect.w, rect.y, r);
      ctx.closePath();
      ctx.clip();
      ctx.translate(rect.x + rect.w, rect.y);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, rect.w, rect.h);
      ctx.restore();
    }
  } else {
    // Normal draw (mirrored)
    ctx.beginPath();
    ctx.moveTo(rect.x + r, rect.y);
    ctx.arcTo(rect.x + rect.w, rect.y, rect.x + rect.w, rect.y + rect.h, r);
    ctx.arcTo(rect.x + rect.w, rect.y + rect.h, rect.x, rect.y + rect.h, r);
    ctx.arcTo(rect.x, rect.y + rect.h, rect.x, rect.y, r);
    ctx.arcTo(rect.x, rect.y, rect.x + rect.w, rect.y, r);
    ctx.closePath();
    ctx.clip();
    ctx.translate(rect.x + rect.w, rect.y);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, rect.w, rect.h);
  }
  ctx.restore();

  // Border glow based on deviation
  if (state === "playing") {
    ctx.save();
    const glowColor = currentDeviation > BUSTED_THRESHOLD ? "#f85149" :
                       currentDeviation > MINOR_THRESHOLD ? "#f0c674" : "#39d353";
    const glowAlpha = Math.min(1, currentDeviation * 2);
    ctx.strokeStyle = glowColor;
    ctx.globalAlpha = 0.3 + glowAlpha * 0.7;
    ctx.lineWidth = 3 + currentDeviation * 6;
    ctx.beginPath();
    ctx.moveTo(rect.x + r, rect.y);
    ctx.arcTo(rect.x + rect.w, rect.y, rect.x + rect.w, rect.y + rect.h, r);
    ctx.arcTo(rect.x + rect.w, rect.y + rect.h, rect.x, rect.y + rect.h, r);
    ctx.arcTo(rect.x, rect.y + rect.h, rect.x, rect.y, r);
    ctx.arcTo(rect.x, rect.y, rect.x + rect.w, rect.y, r);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

function drawComposureMeter(rect) {
  const barW = rect.w + 40;
  const barH = 14;
  const barX = rect.x - 20;
  const barY = rect.y - 30;
  const pct = composure / COMPOSURE_MAX;

  // Background
  ctx.fillStyle = "#21262d";
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 7);
  ctx.fill();

  // Fill
  const fillW = barW * pct;
  let color;
  if (pct > 0.6) color = "#39d353";
  else if (pct > 0.3) color = "#f0c674";
  else color = "#f85149";

  if (fillW > 0) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(barX, barY, fillW, barH, 7);
    ctx.fill();
  }

  // Label
  ctx.fillStyle = "#e6edf3";
  ctx.font = "bold 13px -apple-system, sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("COMPOSURE", barX, barY - 6);
  ctx.textAlign = "right";
  ctx.fillText(`${Math.round(composure)}%`, barX + barW, barY - 6);

  if (streakActive) {
    ctx.save();
    ctx.font = "bold 16px -apple-system, sans-serif";
    ctx.fillStyle = "#39d353";
    ctx.textAlign = "right";
    const pulse = 0.8 + Math.sin(performance.now() * 0.005) * 0.2;
    ctx.globalAlpha = pulse;
    ctx.fillText("\u{1F9CA} ICE COLD", barX + barW, barY + barH + 20);
    ctx.restore();
  }
}

function drawTimer() {
  const secs = Math.ceil(timeRemaining);
  ctx.save();
  ctx.textAlign = "center";
  ctx.fillStyle = "#e6edf3";
  ctx.font = "bold 48px -apple-system, sans-serif";
  ctx.fillText(secs + "s", canvasW / 2, 60);

  if (timeRemaining <= 10) {
    ctx.fillStyle = "#f85149";
    ctx.globalAlpha = 0.5 + Math.sin(performance.now() * 0.01) * 0.5;
    ctx.font = "bold 14px -apple-system, sans-serif";
    ctx.fillText("FINAL COUNTDOWN", canvasW / 2, 82);
  }
  ctx.restore();
}

function drawExpressionIndicators(rect) {
  const indicators = [
    { emoji: "\u{1F60A}", key: "smile", color: "#39d353" },
    { emoji: "\u{1F62E}", key: "surprise", color: "#f0c674" },
    { emoji: "\u{1F602}", key: "laugh", color: "#f85149" },
    { emoji: "\u{1F928}", key: "eyebrow", color: "#bc8cff" }
  ];
  const spacing = 60;
  const startX = rect.x + rect.w + 20;
  const startY = rect.y + 30;

  indicators.forEach((ind, i) => {
    const y = startY + i * spacing;
    const val = expressionIndicators[ind.key];
    ctx.save();
    ctx.font = "32px serif";
    ctx.textAlign = "left";
    ctx.globalAlpha = val > 0 ? 0.4 + val * 0.6 : 0.2;
    ctx.fillText(ind.emoji, startX, y);
    if (val > 0) {
      ctx.globalAlpha = val * 0.6;
      ctx.shadowColor = ind.color;
      ctx.shadowBlur = 15 + val * 15;
      ctx.fillText(ind.emoji, startX, y);
    }
    ctx.restore();
  });
}

function drawProvocations() {
  // Floating emoji
  activeEmoji.forEach(e => {
    ctx.save();
    const fadeIn = Math.min(1, e.life / 20);
    const fadeOut = Math.max(0, 1 - (e.life - e.maxLife + 30) / 30);
    ctx.globalAlpha = Math.min(fadeIn, fadeOut);
    ctx.translate(e.x, e.y);
    const age = performance.now() - (e.spawnTime || 0);
    const entranceScale = age < 150 ? age / 150 : 1;
    const wobble = age < 500 ? Math.sin(age / 50 * Math.PI) * 15 * Math.max(0, 1 - age / 500) * (Math.PI / 180) : 0;
    ctx.scale(entranceScale, entranceScale);
    ctx.rotate(e.rotation + wobble);
    ctx.font = `${e.size}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(e.emoji, 0, 0);
    ctx.restore();
  });

  // Text provocations
  activeProvocations.forEach(p => {
    ctx.save();
    let alpha;
    if (p.life < 20) alpha = p.life / 20;
    else if (p.life > p.maxLife - 30) alpha = (p.maxLife - p.life) / 30;
    else alpha = 1;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.font = "bold 22px -apple-system, sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "#f0c674";
    ctx.shadowColor = "#000";
    ctx.shadowBlur = 8;
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  });
}

function drawBustedFlash() {
  if (bustedFlash <= 0) return;
  ctx.save();
  ctx.globalAlpha = bustedFlash;
  ctx.fillStyle = "#f85149";
  ctx.fillRect(0, 0, canvasW, canvasH);
  ctx.globalAlpha = Math.min(1, bustedFlash * 2);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 80px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("BUSTED!", canvasW / 2, canvasH / 2);
  ctx.restore();
}

function drawFlashingBorder(elapsed) {
  if (elapsed < 50) return;
  ctx.save();
  const pulse = Math.sin(performance.now() * 0.015) * 0.5 + 0.5;
  ctx.strokeStyle = `rgba(248,81,73,${0.3 + pulse * 0.7})`;
  ctx.lineWidth = 6 + pulse * 6;
  ctx.strokeRect(0, 0, canvasW, canvasH);
  ctx.restore();
}

// --- Game Over Screen ---
function showGameOver(won) {
  state = "gameover";
  stopDrone();

  const survivalTime = won ? GAME_DURATION : Math.round(GAME_DURATION - timeRemaining);
  const finalComposure = Math.round(composure);
  const isNewRecord = saveHighScore(survivalTime, finalComposure);

  if (won) {
    playVictoryFanfare();
    spawnConfetti();
    // Victory screenshot with green border
    const tmpCanvas = document.createElement("canvas");
    tmpCanvas.width = video.videoWidth;
    tmpCanvas.height = video.videoHeight;
    const tmpCtx = tmpCanvas.getContext("2d");
    tmpCtx.drawImage(video, 0, 0);
    tmpCtx.strokeStyle = "#39d353";
    tmpCtx.lineWidth = 8;
    tmpCtx.strokeRect(0, 0, tmpCanvas.width, tmpCanvas.height);
    screenshots.push({ url: tmpCanvas.toDataURL("image/jpeg", 0.8), time: GAME_DURATION, deviation: 0 });
  } else {
    playLoseSound();
  }

  overlay.classList.remove("hidden");
  overlay.classList.add("interactive");
  overlayBg.style.display = "block";

  let html = "";
  if (won) {
    html += `<h1 style="color:#f0c674;font-size:56px;text-shadow:0 0 30px rgba(240,198,100,0.5);">STONE FACE CHAMPION!</h1>`;
    html += `<p style="color:#e6edf3;">You survived 60 seconds${finalComposure >= 100 ? ' with full composure' : ''}. Respect.</p>`;
  } else {
    html += `<h1 style="color:#f85149;">YOU CRACKED!</h1>`;
    html += `<p style="color:#e6edf3;">You lasted ${survivalTime} seconds.</p>`;
  }

  if (isNewRecord) {
    html += `<p style="color:#f0c674;font-size:22px;font-weight:bold;margin:8px 0;">\u{1F3C6} NEW RECORD!</p>`;
  }

  // Composure graph
  if (composureHistory.length > 1) {
    html += `<canvas id="composure-graph" width="500" height="120"></canvas>`;
  }

  // Screenshot gallery
  if (screenshots.length > 0) {
    html += `<p style="font-size:14px;color:#8b949e;margin-top:16px;">Moments of weakness (${screenshots.length})</p>`;
    html += `<div id="game-over-gallery">`;
    screenshots.forEach(s => {
      html += `<img src="${s.url}" title="t=${s.time.toFixed(1)}s dev=${s.deviation.toFixed(2)}">`;
    });
    html += `</div>`;
  }

  html += `<button id="replayBtn">Play Again</button>`;

  // Leaderboard section
  const username = getStoredUsername();
  const scoreId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const qualifies = qualifiesForLeaderboard(survivalTime, finalComposure);

  html += `<div style="margin-top:20px;">`;
  if (qualifies) {
    if (username) {
      html += `<button id="saveScoreBtn" class="lb-save-btn" data-id="${scoreId}" data-time="${survivalTime}" data-comp="${finalComposure}" data-won="${won}">Save to Leaderboard</button>`;
    } else {
      html += `<p class="lb-save-hint">Enter a GitHub username on the title screen to save your score</p>`;
    }
  }
  html += `</div>`;

  // Full leaderboard
  const lb = sortLeaderboard([...getLeaderboard()]);
  html += `<div class="lb-container" style="margin-top:16px;"><div class="lb-title">\u{1F3C6} LEADERBOARD</div><div id="gameOverLb">${renderLeaderboardTable(lb, null, 10)}</div></div>`;

  overlayContent.innerHTML = html;

  // Draw composure graph
  requestAnimationFrame(() => {
    const graphCanvas = document.getElementById("composure-graph");
    if (graphCanvas && composureHistory.length > 1) {
      const gctx = graphCanvas.getContext("2d");
      const gw = graphCanvas.width;
      const gh = graphCanvas.height;
      gctx.fillStyle = "#161b22";
      gctx.fillRect(0, 0, gw, gh);

      // Grid lines
      gctx.strokeStyle = "#21262d";
      gctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const gy = gh * i / 4;
        gctx.beginPath(); gctx.moveTo(0, gy); gctx.lineTo(gw, gy); gctx.stroke();
      }

      // Line
      gctx.beginPath();
      gctx.strokeStyle = "#39d353";
      gctx.lineWidth = 2;
      composureHistory.forEach((pt, i) => {
        const x = (pt.t / GAME_DURATION) * gw;
        const y = gh - (pt.v / COMPOSURE_MAX) * gh;
        if (pt.v / COMPOSURE_MAX > 0.6) gctx.strokeStyle = "#39d353";
        else if (pt.v / COMPOSURE_MAX > 0.3) gctx.strokeStyle = "#f0c674";
        else gctx.strokeStyle = "#f85149";
        if (i === 0) gctx.moveTo(x, y); else gctx.lineTo(x, y);
      });
      gctx.stroke();

      // Peak deviation marker
      let peakIdx = 0, peakDev = 0;
      composureHistory.forEach((pt, i) => {
        if (pt.d > peakDev) { peakDev = pt.d; peakIdx = i; }
      });
      if (peakDev > 0) {
        const px = (composureHistory[peakIdx].t / GAME_DURATION) * gw;
        const py = gh - (composureHistory[peakIdx].v / COMPOSURE_MAX) * gh;
        gctx.fillStyle = "#f85149";
        gctx.beginPath(); gctx.arc(px, py, 5, 0, Math.PI * 2); gctx.fill();
        gctx.fillStyle = "#e6edf3";
        gctx.font = "11px sans-serif";
        gctx.textAlign = "center";
        gctx.fillText("peak", px, py - 10);
      }

      // Labels
      gctx.fillStyle = "#8b949e";
      gctx.font = "10px sans-serif";
      gctx.textAlign = "left";
      gctx.fillText("100%", 4, 12);
      gctx.fillText("0%", 4, gh - 4);
      gctx.textAlign = "center";
      gctx.fillText("0s", 20, gh - 4);
      gctx.fillText("60s", gw - 20, gh - 4);
    }

    document.getElementById("replayBtn")?.addEventListener("click", () => resetGame());

    // Save score button
    const saveBtn = document.getElementById("saveScoreBtn");
    if (saveBtn) {
      saveBtn.addEventListener("click", () => {
        const uname = getStoredUsername();
        if (!uname) return;
        const entry = {
          username: uname,
          avatar: avatarUrl(uname, 48),
          timeSurvived: parseInt(saveBtn.dataset.time),
          composure: parseInt(saveBtn.dataset.comp),
          won: saveBtn.dataset.won === 'true',
          date: new Date().toISOString(),
          id: saveBtn.dataset.id
        };
        addToLeaderboard(entry);
        saveBtn.textContent = '\u2713 Saved!';
        saveBtn.disabled = true;
        // Re-render leaderboard
        const lbEl = document.getElementById("gameOverLb");
        if (lbEl) {
          const updated = sortLeaderboard([...getLeaderboard()]);
          lbEl.innerHTML = renderLeaderboardTable(updated, entry.id, 10);
        }
      });
    }
  });
}

// --- Game Flow ---
function resetGame() {
  composure = COMPOSURE_MAX;
  timeRemaining = GAME_DURATION;
  screenshots = [];
  composureHistory = [];
  currentDeviation = 0;
  bustedFlash = 0;
  lastBustedTime = 0;
  activeProvocations = [];
  activeEmoji = [];
  provocationIndex = 0;
  emojiIndex = 0;
  lastProvTime = 0;
  lastEmojiTime = 0;
  lastSoundTime = 0;
  activeFilter = null;
  lastFilterTime = 0;
  expressionIndicators = { smile: 0, surprise: 0, laugh: 0, eyebrow: 0 };
  calibrationSamples = [];
  baseline = {};
  borderFlash = 0;
  deviationBuffer = [];
  shuffledText = shuffleArray(PROVOCATIONS.text);
  shuffledEmoji = shuffleArray(PROVOCATIONS.emoji);
  confettiParticles = [];
  confettiCtx.clearRect(0, 0, canvasW, canvasH);
  countdownBeepsPlayed = {};
  streakStart = 0;
  streakActive = false;
  state = "calibrating";
  calibrationStart = performance.now();

  overlay.classList.remove("hidden");
  overlay.classList.add("interactive");
  overlayBg.style.display = "block";
  overlayContent.innerHTML = `
    <div class="calibration-text">Calibrating...</div>
    <div class="calibration-sub">Look at the camera with a normal, relaxed face.</div>
    <div class="calibration-sub" style="margin-top:16px;font-size:14px;color:#58a6ff;" id="cal-progress">0%</div>
  `;
}

function finishCalibration() {
  // Average all samples
  baseline = {};
  for (const key of BLENDSHAPE_KEYS) {
    let sum = 0;
    let count = 0;
    for (const sample of calibrationSamples) {
      if (sample[key] !== undefined) { sum += sample[key]; count++; }
    }
    baseline[key] = count > 0 ? sum / count : 0;
  }

  // Start countdown
  state = "countdown";
  countdownValue = 3;
  countdownStart = performance.now();
  ensureAudio();
}

function startPlaying() {
  state = "playing";
  gameStartTime = performance.now();
  lastFrameTime = performance.now();
  overlay.classList.add("hidden");
  overlay.classList.remove("interactive");
  startDrone();
}

// --- Main Loop ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  resizeCanvas();
  ctx.clearRect(0, 0, canvasW, canvasH);
  ctx.fillStyle = "#0d1117";
  ctx.fillRect(0, 0, canvasW, canvasH);

  if (!webcamReady) return;

  const rect = getWebcamRect();

  if (state === "calibrating") {
    drawWebcam(rect);
    const elapsed = (performance.now() - calibrationStart) / 1000;
    const progress = Math.min(1, elapsed / 3);
    const calProg = document.getElementById("cal-progress");
    if (calProg) calProg.textContent = Math.round(progress * 100) + "%";

    const bs = getBlendshapes();
    if (bs) calibrationSamples.push(bs);

    if (elapsed >= 3) {
      finishCalibration();
    }
    return;
  }

  if (state === "countdown") {
    drawWebcam(rect);
    const elapsed = (performance.now() - countdownStart) / 1000;
    const val = 3 - Math.floor(elapsed);
    if (val !== countdownValue && val >= 0) {
      countdownValue = val;
    }
    if (val <= 0) {
      startPlaying();
      return;
    }
    overlayContent.innerHTML = `<div class="countdown-text">${val}</div>`;
    return;
  }

  if (state === "gameover") {
    drawWebcam(rect);
    updateConfetti();
    drawConfetti();
    return;
  }

  if (state !== "playing") {
    drawWebcam(rect);
    return;
  }

  // --- PLAYING STATE ---
  const now = performance.now();
  const dt = Math.min(50, now - lastFrameTime);
  lastFrameTime = now;
  const elapsed = (now - gameStartTime) / 1000;
  timeRemaining = Math.max(0, GAME_DURATION - elapsed);

  // Get blendshapes
  const bs = getBlendshapes();
  currentDeviation = calcDeviation(bs);
  detectExpressions(bs);

  // Smoothed deviation (average of last 4 frames) for composure drain
  deviationBuffer.push(currentDeviation);
  if (deviationBuffer.length > 4) deviationBuffer.shift();
  const smoothedDeviation = deviationBuffer.reduce((a, b) => a + b, 0) / deviationBuffer.length;

  // Composure logic (smoothed to prevent jitter-based false triggers)
  if (smoothedDeviation > MINOR_THRESHOLD) {
    composure -= smoothedDeviation * DRAIN_MULTIPLIER * (dt / 33.33);
  } else if (smoothedDeviation < NEUTRAL_THRESHOLD) {
    composure += REGEN_RATE * (dt / 33.33);
    if (streakActive) composure += 2 * (dt / 1000);
  }

  // Busted check (uses smoothed deviation)
  if (smoothedDeviation > BUSTED_THRESHOLD && now - lastBustedTime > 2000) {
    composure -= BUSTED_PENALTY;
    bustedFlash = 1;
    lastBustedTime = now;
    playBustedSound();
    takeScreenshot();
  }

  composure = Math.max(0, Math.min(COMPOSURE_MAX, composure));

  // Record history (every ~0.5s)
  if (composureHistory.length === 0 || elapsed - composureHistory[composureHistory.length - 1].t > 0.5) {
    composureHistory.push({ t: elapsed, v: composure, d: currentDeviation });
  }

  // Check win/lose
  if (composure <= 0) {
    showGameOver(false);
    return;
  }
  if (timeRemaining <= 0) {
    showGameOver(true);
    return;
  }

  // --- Provocations ---
  const phase = elapsed < 10 ? 0 : elapsed < 20 ? 1 : elapsed < 30 ? 2 : elapsed < 40 ? 3 : elapsed < 50 ? 4 : 5;

  // Emoji spawning
  const emojiInterval = phase >= 4 ? 400 : phase >= 3 ? 800 : 1500;
  if ((phase === 0 || phase >= 3) && now - lastEmojiTime > emojiInterval) {
    spawnEmoji(now);
    lastEmojiTime = now;
  }

  // Text provocations
  const textInterval = phase >= 4 ? 2000 : phase >= 3 ? 3000 : 4000;
  if ((phase === 1 || phase >= 3) && now - lastProvTime > textInterval) {
    spawnTextProvocation(rect);
    lastProvTime = now;
  }

  // Filters
  if (phase === 2 || phase >= 4) {
    if (now - lastFilterTime > 3000) {
      pickFilter();
      lastFilterTime = now;
    }
  } else if (phase < 2) {
    activeFilter = null;
  }

  // Sound effects
  const soundInterval = phase >= 5 ? 1500 : phase >= 4 ? 2500 : phase >= 3 ? 4000 : 5000;
  if (phase >= 3 && now - lastSoundTime > soundInterval) {
    playRandomSound();
    lastSoundTime = now;
  }

  // Countdown beeps
  const beepMarks = [
    { time: 10, freq: 400 },
    { time: 5, freq: 600 },
    { time: 3, freq: 800 },
    { time: 2, freq: 1000 },
    { time: 1, freq: 1200 }
  ];
  for (const mark of beepMarks) {
    if (timeRemaining <= mark.time && !countdownBeepsPlayed[mark.time]) {
      playCountdownBeep(mark.freq);
      countdownBeepsPlayed[mark.time] = true;
    }
  }

  // Composure streak tracking
  if (smoothedDeviation < NEUTRAL_THRESHOLD) {
    if (!streakStart) streakStart = now;
    streakActive = (now - streakStart) / 1000 >= 5;
  } else {
    streakStart = 0;
    streakActive = false;
  }

  // Update emoji positions
  activeEmoji = activeEmoji.filter(e => {
    e.x += e.vx;
    e.y += e.vy;
    e.rotation += e.rotSpeed;
    e.life++;
    return e.life < e.maxLife && e.x > -100 && e.x < canvasW + 100;
  });

  // Update text provocations
  activeProvocations = activeProvocations.filter(p => {
    p.life++;
    return p.life < p.maxLife;
  });

  // Busted flash decay
  if (bustedFlash > 0) bustedFlash = Math.max(0, bustedFlash - 0.03);

  // Update drone
  updateDrone(elapsed);

  // --- Draw ---
  drawWebcam(rect);
  drawComposureMeter(rect);
  drawTimer();
  drawExpressionIndicators(rect);
  drawProvocations();
  drawBustedFlash();
  if (elapsed >= 50) drawFlashingBorder(elapsed);
}

// --- Startup ---
async function init() {
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // Show high score on title screen
  const hs = getHighScore();
  const hsDisplay = document.getElementById('highScoreDisplay');
  if (hs && hsDisplay) {
    const composureText = hs.composure >= 100 ? ' (full composure!)' : '';
    hsDisplay.textContent = `BEST: ${hs.time}s${composureText}`;
  }

  // Username input + avatar preview
  const ghInput = document.getElementById('ghUsernameInput');
  const ghAvatar = document.getElementById('ghAvatarPreview');
  const storedName = getStoredUsername();
  if (storedName && ghInput) {
    ghInput.value = storedName;
    if (ghAvatar) {
      ghAvatar.src = avatarUrl(storedName, 80);
      ghAvatar.style.display = 'block';
      ghAvatar.onerror = () => { ghAvatar.style.display = 'none'; };
    }
  }
  let avatarDebounce = null;
  if (ghInput) {
    ghInput.addEventListener('input', () => {
      const val = ghInput.value.trim();
      setStoredUsername(val);
      clearTimeout(avatarDebounce);
      if (!val) {
        if (ghAvatar) ghAvatar.style.display = 'none';
        return;
      }
      avatarDebounce = setTimeout(() => {
        if (ghAvatar) {
          ghAvatar.src = avatarUrl(val, 80);
          ghAvatar.style.display = 'block';
          ghAvatar.onerror = () => { ghAvatar.style.display = 'none'; };
        }
      }, 400);
    });
  }

  // Title screen leaderboard
  renderTitleLeaderboard();

  startBtn.addEventListener("click", async () => {
    startBtn.disabled = true;
    startBtn.textContent = "Loading...";
    try {
      await Promise.all([initFaceLandmarker(), initWebcam()]);
      resetGame();
    } catch (e) {
      overlayContent.innerHTML = `
        <h1>STONE FACE</h1>
        <p style="color:#f85149;">Error: ${e.message}</p>
        <p>Make sure you allow camera access and are using Chrome.</p>
        <button onclick="location.reload()">Retry</button>
      `;
    }
  });

  requestAnimationFrame(gameLoop);
}

init();
</script>
